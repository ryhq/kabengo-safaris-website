<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f5f0eb"/>
  <rect width="800" height="600" fill="url(#grad)" opacity="0.25"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="800" y2="600">
      <stop offset="0%" stop-color="#4A7C5F"/>
      <stop offset="100%" stop-color="#274e22"/>
    </linearGradient>
  </defs>
  <!-- Landscape -->
  <path d="M0 400 Q200 370 400 390 Q600 370 800 380 L800 600 L0 600Z" fill="#274e22" opacity="0.1"/>
  <!-- Binoculars silhouette -->
  <g transform="translate(340, 180)" opacity="0.12">
    <circle cx="30" cy="40" r="40" stroke="#274e22" stroke-width="8" fill="none"/>
    <circle cx="90" cy="40" r="40" stroke="#274e22" stroke-width="8" fill="none"/>
    <rect x="50" y="20" width="20" height="40" fill="#274e22"/>
    <rect x="20" y="80" width="20" height="30" rx="5" fill="#274e22"/>
    <rect x="80" y="80" width="20" height="30" rx="5" fill="#274e22"/>
  </g>
  <!-- Compass rose -->
  <g transform="translate(400, 350)" opacity="0.1">
    <circle cx="0" cy="0" r="50" stroke="#274e22" stroke-width="2" fill="none"/>
    <path d="M0 -45 L5 -10 L0 0 L-5 -10Z" fill="#274e22"/>
    <path d="M0 45 L5 10 L0 0 L-5 10Z" fill="#274e22" opacity="0.5"/>
    <path d="M-45 0 L-10 -5 L0 0 L-10 5Z" fill="#274e22" opacity="0.5"/>
    <path d="M45 0 L10 -5 L0 0 L10 5Z" fill="#274e22"/>
  </g>
  <!-- Footprints -->
  <g fill="#274e22" opacity="0.08">
    <ellipse cx="200" cy="430" rx="8" ry="12" transform="rotate(-15 200 430)"/>
    <ellipse cx="230" cy="450" rx="8" ry="12" transform="rotate(-10 230 450)"/>
    <ellipse cx="260" cy="435" rx="8" ry="12" transform="rotate(-20 260 435)"/>
    <ellipse cx="550" cy="440" rx="8" ry="12" transform="rotate(10 550 440)"/>
    <ellipse cx="580" cy="425" rx="8" ry="12" transform="rotate(15 580 425)"/>
    <ellipse cx="610" cy="445" rx="8" ry="12" transform="rotate(5 610 445)"/>
  </g>
  <!-- Text -->
  <text x="400" y="530" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#274e22" opacity="0.3">KABENGO SAFARIS</text>
</svg>
