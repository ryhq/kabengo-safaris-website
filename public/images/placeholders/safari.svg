<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f5f0eb"/>
  <rect width="800" height="600" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="800" y2="600">
      <stop offset="0%" stop-color="#5a1e03"/>
      <stop offset="100%" stop-color="#274e22"/>
    </linearGradient>
  </defs>
  <!-- Horizon line -->
  <path d="M0 420 Q200 380 400 400 Q600 420 800 390 L800 600 L0 600Z" fill="#274e22" opacity="0.15"/>
  <!-- Mountains -->
  <path d="M100 420 L250 280 L400 420Z" fill="#5a1e03" opacity="0.12"/>
  <path d="M300 420 L500 240 L700 420Z" fill="#5a1e03" opacity="0.08"/>
  <!-- Sun -->
  <circle cx="600" cy="200" r="60" fill="#5a1e03" opacity="0.1"/>
  <!-- Acacia tree -->
  <rect x="395" y="320" width="10" height="100" fill="#5a1e03" opacity="0.15"/>
  <ellipse cx="400" cy="310" rx="60" ry="30" fill="#274e22" opacity="0.15"/>
  <!-- Jeep silhouette -->
  <rect x="180" y="385" width="80" height="30" rx="5" fill="#5a1e03" opacity="0.12"/>
  <rect x="175" y="375" width="50" height="15" rx="3" fill="#5a1e03" opacity="0.12"/>
  <circle cx="195" cy="420" r="10" fill="#5a1e03" opacity="0.12"/>
  <circle cx="245" cy="420" r="10" fill="#5a1e03" opacity="0.12"/>
  <!-- Text -->
  <text x="400" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#5a1e03" opacity="0.3">KABENGO SAFARIS</text>
</svg>
